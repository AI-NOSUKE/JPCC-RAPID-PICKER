name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # CIだけ実行前に jpcc_rapid_picker.py の LIMIT を 1 に強制置換（sedは使わない）
      - name: Force LIMIT=1 for CI run
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          p = Path('jpcc_rapid_picker.py')
          t = p.read_text(encoding='utf-8')
          t2 = re.sub(r'(?m)^\s*LIMIT\s*=\s*\d+', 'LIMIT = 1', t)
          p.write_text(t2, encoding='utf-8')
          print('LIMIT patched to 1')
          PY

      - name: Run picker (LIMIT=1)
        run: python jpcc_rapid_picker.py

      - name: Check output
        run: |
          test -f output.csv
          head -n 5 output.csv || true
