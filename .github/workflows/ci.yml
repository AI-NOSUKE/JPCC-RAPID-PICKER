name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ←この一行が「実行前に LIMIT=1 に書き換える」処理（コード本体はそのままでOK）
      - name: Force LIMIT=1 for CI run
        run: sed -i 's/^LIMIT *=.*/LIMIT = 1  # CI override/' jpcc_rapid_picker.py

      - name: Run picker (LIMIT=1)
        run: python jpcc_rapid_picker.py

      - name: Check output
        run: |
          test -f output.csv
          head -n 5 output.csv || true
